# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# SNPRelate depends on Bioconductor packages (gdsfmt, SeqArray, BiocGenerics),
# so dependency installation is done through BiocManager via
# r-lib/actions/setup-r-dependencies (which understands biocViews in DESCRIPTION).

name: R-CMD-check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macOS-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Missing Suggests should not turn the check into an error.
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # pak resolves the Bioconductor dependencies (gdsfmt, SeqArray,
          # BiocGenerics) automatically from the biocViews in DESCRIPTION.
          extra-packages: |
            any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--no-build-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          error-on: '"error"'
          upload-snapshots: true
